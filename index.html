<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#05080F">
<title>流光清单 · Lumen</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌠</text></svg>">
<style>
  :root {
    --bg0: #04070E;
    --card: rgba(17, 26, 50, 0.60);
    --card-solid: #101A33;
    --line: rgba(140, 170, 225, 0.15);
    --text: #EAF0FB;
    --muted: #8CA0C4;
    --teal: #46E8D2;
    --violet: #8B7DFF;
    --coral: #FF7A6B;
    --amber: #FFC24D;
    --low: #7C93B8;
    --teal-soft: rgba(70, 232, 210, 0.13);
    --violet-soft: rgba(139, 125, 255, 0.15);
    --coral-soft: rgba(255, 122, 107, 0.14);
    --amber-soft: rgba(255, 194, 77, 0.13);
    --low-soft: rgba(124, 147, 184, 0.16);
    --ring-track: rgba(140, 170, 225, 0.14);
    --shadow: 0 12px 44px rgba(0, 0, 0, 0.5);
    --glow: 0 0 22px rgba(70, 232, 210, 0.22);
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --font-num: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { color-scheme: dark; }
  body {
    font-family: var(--font-ui);
    background:
      radial-gradient(130% 90% at 50% -10%, #0D1734 0%, #070D1D 52%, var(--bg0) 100%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  #sky {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    z-index: 0; pointer-events: none;
  }
  #fx {
    position: fixed; inset: 0; width: 100vw; height: 100vh;
    z-index: 60; pointer-events: none;
  }
  .app {
    position: relative; z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: max(28px, env(safe-area-inset-top)) 18px 96px;
  }

  /* ---------- header ---------- */
  header.top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; margin-bottom: 24px;
  }
  .brand h1 {
    margin: 0; font-size: 2.05rem; font-weight: 800; letter-spacing: 0.08em;
    background: linear-gradient(92deg, #46E8D2 5%, #8B7DFF 52%, #FF9A8B 95%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    filter: drop-shadow(0 0 14px rgba(70, 232, 210, 0.35));
    text-wrap: balance;
  }
  .brand .dateline {
    margin: 4px 0 0; color: var(--muted); font-size: 0.86rem; letter-spacing: 0.06em;
  }
  .statbox {
    display: flex; align-items: center; gap: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 11px 16px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  .ringwrap { position: relative; width: 62px; height: 62px; flex: none; }
  .ringwrap svg { transform: rotate(-90deg); display: block; filter: drop-shadow(0 0 8px rgba(70, 232, 210, 0.5)); }
  .ring-track { stroke: var(--ring-track); }
  .ring-bar { transition: stroke-dashoffset 0.7s cubic-bezier(.22,1,.36,1); }
  .ringnum {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: var(--font-num); font-size: 0.84rem; font-weight: 700;
    font-variant-numeric: tabular-nums; color: var(--teal);
    text-shadow: 0 0 10px rgba(70, 232, 210, 0.6);
  }
  .statmeta { display: flex; flex-direction: column; gap: 2px; }
  .statmeta .slabel { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.16em; }
  .statmeta .sval {
    font-family: var(--font-num); font-size: 1.05rem; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .streak { color: var(--amber); text-shadow: 0 0 12px rgba(255, 194, 77, 0.45); }

  /* ---------- composer ---------- */
  .composer {
    background: var(--card);
    background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 34%);
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 12px;
    margin-bottom: 18px;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .composer:focus-within {
    border-color: rgba(70, 232, 210, 0.45);
    box-shadow: var(--shadow), var(--glow);
  }
  .composer form { display: flex; gap: 8px; }
  .composer input[type="text"] {
    flex: 1; min-width: 0;
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 1rem; font-family: var(--font-ui);
    padding: 8px 6px;
  }
  .composer input[type="text"]::placeholder { color: var(--muted); }
  .btn {
    border: 1px solid var(--line);
    background: rgba(140, 170, 225, 0.06);
    color: var(--text);
    border-radius: 13px;
    padding: 8px 15px;
    font-size: 0.9rem;
    font-family: var(--font-ui);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
  }
  .btn:hover { background: var(--teal-soft); box-shadow: 0 0 14px rgba(70, 232, 210, 0.18); }
  .btn:active { transform: scale(0.96); }
  .btn:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, .check:focus-visible {
    outline: 2px solid var(--teal); outline-offset: 2px;
  }
  .btn.primary {
    background: linear-gradient(135deg, #2BD9C0 0%, #6C8CFF 100%);
    color: #04121A; border-color: transparent; font-weight: 800;
    box-shadow: 0 4px 20px rgba(70, 232, 210, 0.35);
  }
  .btn.primary:hover { filter: brightness(1.1); box-shadow: 0 4px 26px rgba(70, 232, 210, 0.5); }
  .extra { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); display: grid; gap: 10px; }
  .extra[hidden] { display: none; }
  .exrow { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .exlabel { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.14em; min-width: 3.2em; }
  .chip {
    border: 1px solid var(--line); background: transparent; color: var(--muted);
    border-radius: 999px; padding: 4px 12px; font-size: 0.82rem; cursor: pointer;
    font-family: var(--font-ui); transition: all 0.15s;
  }
  .chip:hover { border-color: rgba(70, 232, 210, 0.4); color: var(--text); }
  .chip.on { border-color: transparent; font-weight: 700; }
  .chip.on.p-high { background: var(--coral-soft); color: var(--coral); box-shadow: 0 0 12px rgba(255, 122, 107, 0.3); }
  .chip.on.p-mid { background: var(--amber-soft); color: var(--amber); box-shadow: 0 0 12px rgba(255, 194, 77, 0.3); }
  .chip.on.p-low { background: var(--low-soft); color: var(--low); }
  .chip.on.p-none { background: var(--teal-soft); color: var(--teal); box-shadow: 0 0 12px rgba(70, 232, 210, 0.25); }
  .chip.on.datechip { background: var(--teal-soft); color: var(--teal); box-shadow: 0 0 12px rgba(70, 232, 210, 0.25); }
  input[type="date"], .extra input[type="text"], .extra textarea, select {
    background: rgba(140, 170, 225, 0.05); border: 1px solid var(--line); border-radius: 11px;
    color: var(--text); font-family: var(--font-ui); font-size: 0.88rem;
    padding: 5px 10px;
  }
  input[type="date"] { font-family: var(--font-num); color-scheme: dark; }
  .extra input[type="text"] { flex: 1; min-width: 140px; }
  select option { background: var(--card-solid); color: var(--text); }

  /* ---------- toolbar ---------- */
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
  .seg {
    display: flex; background: var(--card); border: 1px solid var(--line);
    border-radius: 999px; padding: 3px; gap: 2px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .seg button {
    border: none; background: transparent; color: var(--muted);
    padding: 6px 12px; border-radius: 999px; font-size: 0.86rem; cursor: pointer;
    font-family: var(--font-ui); transition: all 0.15s; white-space: nowrap;
  }
  .seg button:hover { color: var(--text); }
  .seg button.on {
    background: linear-gradient(135deg, #2BD9C0, #6C8CFF);
    color: #04121A; font-weight: 800;
    box-shadow: 0 0 14px rgba(70, 232, 210, 0.4);
  }
  .searchwrap { flex: 1; min-width: 150px; display: flex; }
  .searchwrap input {
    width: 100%; background: var(--card); border: 1px solid var(--line);
    border-radius: 999px; padding: 7px 16px; color: var(--text);
    font-size: 0.88rem; font-family: var(--font-ui); outline: none;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .searchwrap input:focus { border-color: rgba(70, 232, 210, 0.45); box-shadow: var(--glow); }
  .searchwrap input::placeholder { color: var(--muted); }
  .tagsuggest:empty { display: none; }
  .tagsuggest .chip.on {
    background: var(--teal-soft); color: var(--teal); border-color: transparent;
    box-shadow: 0 0 12px rgba(70, 232, 210, 0.25);
  }
  #tagSuggest .chip { display: inline-flex; align-items: center; gap: 7px; }
  #tagSuggest .chip > button {
    background: none; border: none; color: inherit; font: inherit;
    cursor: pointer; padding: 0;
  }
  #tagSuggest .tagx { opacity: 0.5; line-height: 1; }
  #tagSuggest .tagx:hover { opacity: 1; color: var(--coral); }
  .tagrow { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .tagrow:empty { display: none; }
  .tagrow .chip.on { background: var(--teal-soft); color: var(--teal); border-color: transparent; box-shadow: 0 0 12px rgba(70, 232, 210, 0.25); }

  /* ---------- week view ---------- */
  .weeknote {
    margin: 0 0 12px; color: var(--muted); font-size: 0.84rem; letter-spacing: 0.05em;
    padding: 0 4px;
  }
  li.dayhead {
    list-style: none; margin-top: 12px; padding: 2px 4px;
    display: flex; align-items: baseline; gap: 8px;
    font-size: 0.82rem; color: var(--muted); letter-spacing: 0.12em;
  }
  li.dayhead:first-child { margin-top: 0; }
  li.dayhead .dhdate { font-family: var(--font-num); font-variant-numeric: tabular-nums; }
  li.dayhead .dhtoday {
    background: var(--teal-soft); color: var(--teal); font-weight: 700;
    border-radius: 999px; padding: 1px 9px; font-size: 0.72rem; letter-spacing: 0.06em;
    box-shadow: 0 0 10px rgba(70, 232, 210, 0.25);
  }
  li.dayhead .dhcount { margin-left: auto; font-family: var(--font-num); font-variant-numeric: tabular-nums; }
  .badge.roll { background: var(--amber-soft); color: var(--amber); font-family: var(--font-ui); }

  /* ---------- list ---------- */
  ul.list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  li.task {
    background: var(--card);
    background-image: linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 36%);
    border: 1px solid var(--line);
    border-radius: 17px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 12px 14px;
    display: flex; gap: 12px; align-items: flex-start;
    transition: opacity 0.3s, transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  }
  li.task:hover {
    transform: translateY(-2px);
    border-color: rgba(70, 232, 210, 0.32);
    box-shadow: var(--shadow), var(--glow);
  }
  li.task.entering { animation: slidein 0.4s cubic-bezier(.22,1,.36,1); }
  @keyframes slidein {
    from { opacity: 0; transform: translateY(-10px) scale(0.97); }
    to { opacity: 1; transform: none; }
  }
  li.task.dragging { opacity: 0.55; transform: scale(1.02); box-shadow: 0 18px 50px rgba(0,0,0,0.55), var(--glow); }
  .check {
    flex: none; width: 26px; height: 26px; margin-top: 2px;
    border-radius: 50%; border: 2px solid var(--muted);
    background: transparent; cursor: pointer; position: relative;
    transition: all 0.2s;
  }
  .check:hover { border-color: var(--teal); box-shadow: 0 0 12px rgba(70, 232, 210, 0.4); }
  .check.pri-high { border-color: var(--coral); box-shadow: 0 0 10px rgba(255, 122, 107, 0.35); }
  .check.pri-mid { border-color: var(--amber); box-shadow: 0 0 10px rgba(255, 194, 77, 0.3); }
  .check.pri-low { border-color: var(--low); }
  .check.done {
    background: linear-gradient(135deg, #2BD9C0, #6C8CFF);
    border-color: transparent;
    box-shadow: 0 0 14px rgba(70, 232, 210, 0.5);
    animation: pop 0.35s cubic-bezier(.22,1.6,.36,1);
  }
  @keyframes pop {
    0% { transform: scale(0.6); }
    60% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }
  .check.done::after {
    content: ""; position: absolute; left: 7px; top: 3px;
    width: 6px; height: 11px;
    border: solid #04121A; border-width: 0 2.5px 2.5px 0;
    transform: rotate(42deg);
  }
  .tbody { flex: 1; min-width: 0; }
  .ttitle { font-size: 0.98rem; font-weight: 600; word-break: break-word; }
  li.task.isdone .ttitle { color: var(--muted); text-decoration: line-through; font-weight: 400; }
  li.task.isdone { opacity: 0.7; }
  .tnote { font-size: 0.84rem; color: var(--muted); margin-top: 2px; white-space: pre-wrap; word-break: break-word; }
  .tmeta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
  .tmeta:empty { display: none; }
  .badge {
    font-size: 0.72rem; padding: 2px 9px; border-radius: 999px;
    font-family: var(--font-num); font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
  }
  .badge.due { background: var(--teal-soft); color: var(--teal); }
  .badge.due.today { background: var(--amber-soft); color: var(--amber); font-weight: 700; }
  .badge.due.overdue { background: var(--coral-soft); color: var(--coral); font-weight: 700; }
  .badge.tag { background: var(--violet-soft); color: #B3A9FF; font-family: var(--font-ui); }
  .badge.pri-high { background: var(--coral-soft); color: var(--coral); font-family: var(--font-ui); }
  .badge.pri-mid { background: var(--amber-soft); color: var(--amber); font-family: var(--font-ui); }
  .badge.pri-low { background: var(--low-soft); color: var(--low); font-family: var(--font-ui); }
  .tacts { display: flex; gap: 2px; flex: none; }
  .iconbtn {
    border: none; background: transparent; color: var(--muted);
    width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
    font-size: 0.95rem; line-height: 1; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .iconbtn:hover { background: var(--teal-soft); color: var(--teal); }
  .iconbtn.del:hover { background: var(--coral-soft); color: var(--coral); }
  .draghandle { cursor: grab; touch-action: none; font-size: 1.05rem; letter-spacing: -1px; }
  .draghandle:active { cursor: grabbing; }

  /* editor inside task */
  .editor { flex: 1; display: grid; gap: 9px; }
  .editor input[type="text"], .editor textarea {
    width: 100%; background: rgba(140, 170, 225, 0.05); border: 1px solid var(--line); border-radius: 11px;
    color: var(--text); font-family: var(--font-ui); font-size: 0.92rem; padding: 7px 10px;
    resize: vertical;
  }
  .editor .exrow { gap: 7px; }
  .edacts { display: flex; gap: 8px; justify-content: flex-end; }

  /* done group */
  details.donegroup { margin-top: 18px; }
  details.donegroup summary {
    cursor: pointer; color: var(--muted); font-size: 0.85rem; letter-spacing: 0.12em;
    padding: 6px 4px; user-select: none; list-style: none;
  }
  details.donegroup summary::-webkit-details-marker { display: none; }
  details.donegroup summary::before { content: "▸ "; color: var(--teal); }
  details[open].donegroup summary::before { content: "▾ "; }
  details.donegroup ul.list { margin-top: 8px; }

  /* empty state */
  .empty { text-align: center; padding: 56px 20px; color: var(--muted); }
  .empty .glyph { font-size: 2.4rem; display: block; margin-bottom: 12px; filter: drop-shadow(0 0 16px rgba(70, 232, 210, 0.4)); }
  .empty p { margin: 0; font-size: 0.92rem; }

  /* footer */
  footer.foot {
    margin-top: 36px; display: flex; flex-wrap: wrap; gap: 10px;
    align-items: center; justify-content: space-between;
    color: var(--muted); font-size: 0.78rem;
  }
  footer.foot .fbtns { display: flex; gap: 8px; }

  /* toast */
  .toast {
    position: fixed; left: 50%; bottom: max(26px, env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px);
    background: var(--card-solid); color: var(--text);
    border: 1px solid rgba(70, 232, 210, 0.3); border-radius: 15px;
    padding: 11px 18px; box-shadow: var(--shadow), var(--glow);
    display: flex; gap: 14px; align-items: center;
    font-size: 0.9rem; z-index: 80;
    opacity: 0; pointer-events: none; transition: all 0.28s cubic-bezier(.22,1,.36,1);
    max-width: calc(100vw - 32px);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
  .toast button {
    border: none; background: none; color: var(--teal); font-weight: 700;
    cursor: pointer; font-size: 0.9rem; font-family: var(--font-ui); padding: 0;
    text-shadow: 0 0 10px rgba(70, 232, 210, 0.5);
  }

  /* sync status */
  .syncstatus { display: inline-flex; align-items: center; gap: 7px; }
  .syncstatus .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex: none; }
  .syncstatus .dot.ok { background: var(--teal); box-shadow: 0 0 8px rgba(70, 232, 210, 0.7); }
  .syncstatus .dot.busy { background: var(--amber); box-shadow: 0 0 8px rgba(255, 194, 77, 0.7); }
  .syncstatus .dot.err { background: var(--coral); box-shadow: 0 0 8px rgba(255, 122, 107, 0.7); }

  /* backup dialog */
  dialog.backup {
    background: var(--card-solid); color: var(--text);
    border: 1px solid var(--line); border-radius: 20px;
    box-shadow: var(--shadow); padding: 20px;
    width: min(560px, calc(100vw - 32px));
  }
  dialog.backup::backdrop { background: rgba(3, 6, 14, 0.7); backdrop-filter: blur(4px); }
  dialog.backup h2 { margin: 0 0 6px; font-size: 1.05rem; }
  dialog.backup p.hint { margin: 0 0 12px; color: var(--muted); font-size: 0.82rem; }
  dialog.backup textarea {
    width: 100%; height: 180px; font-family: var(--font-num); font-size: 0.78rem;
    background: rgba(140, 170, 225, 0.05); color: var(--text);
    border: 1px solid var(--line); border-radius: 12px; padding: 10px; resize: vertical;
  }
  dialog.backup .dacts { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; flex-wrap: wrap; }
  dialog.backup .steps { color: var(--muted); font-size: 0.84rem; margin: 0 0 14px; padding-left: 1.3em; display: grid; gap: 4px; }
  dialog.backup .steps a { color: var(--teal); }
  dialog.backup .steps code { font-family: var(--font-num); font-size: 0.78rem; color: var(--text); }
  dialog.backup .exrow { margin-bottom: 9px; }
  dialog.backup .exrow input {
    flex: 1; min-width: 0; background: rgba(140, 170, 225, 0.05);
    border: 1px solid var(--line); border-radius: 11px;
    color: var(--text); padding: 7px 10px; font-size: 0.88rem; font-family: var(--font-num);
  }
  #syncMsg { min-height: 1.2em; }
  #syncMsg.err { color: var(--coral); }
  #syncMsg.ok { color: var(--teal); }

  /* ---------- 入场与微交互动效 ---------- */
  @keyframes fadeup {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: none; }
  }
  header.top, .composer, .toolbar, .tagrow, footer.foot {
    animation: fadeup 0.65s cubic-bezier(.22,1,.36,1) backwards;
  }
  header.top { animation-delay: 0.05s; }
  .composer { animation-delay: 0.14s; }
  .toolbar { animation-delay: 0.22s; }
  .tagrow { animation-delay: 0.28s; }
  footer.foot { animation-delay: 0.42s; }
  li.task.boot { animation: fadeup 0.55s cubic-bezier(.22,1,.36,1) backwards; }

  .brand h1 { background-size: 230% 100%; animation: shimmer 10s ease-in-out infinite; }
  @keyframes shimmer {
    0%, 100% { background-position: 0% 0; }
    50% { background-position: 96% 0; }
  }

  li.task.completing { animation: donecard 0.45s ease forwards; }
  @keyframes donecard {
    30% { transform: scale(0.985); }
    100% { opacity: 0.35; transform: scale(0.98) translateY(3px); }
  }
  li.task.completing .ttitle { position: relative; }
  li.task.completing .ttitle::after {
    content: ""; position: absolute; left: 0; top: 58%; height: 2px; width: 0;
    background: var(--teal); box-shadow: 0 0 8px rgba(70, 232, 210, 0.8);
    animation: strike 0.3s ease 0.05s forwards;
  }
  @keyframes strike { to { width: 100%; } }
  li.task.leaving { animation: leavecard 0.24s ease forwards; }
  @keyframes leavecard { to { opacity: 0; transform: translateX(32px) scale(0.96); } }

  .empty .glyph { display: inline-block; animation: floaty 4.5s ease-in-out infinite; }
  @keyframes floaty { 50% { transform: translateY(-8px); } }

  .ringwrap { transition: filter 0.4s; }
  .ringwrap.full { filter: drop-shadow(0 0 12px rgba(70, 232, 210, 0.6)); }
  .chip:active, .seg button:active { transform: scale(0.94); }

  @media (max-width: 560px) {
    .app { padding: 20px 12px 86px; }
    .brand h1 { font-size: 1.55rem; }
    .statbox { padding: 8px 12px; gap: 10px; }
    .statmeta.hidesm { display: none; }
    .seg button { padding: 6px 9px; font-size: 0.8rem; }
    .iconbtn { width: 36px; height: 36px; }
    .check { width: 28px; height: 28px; }
    .check.done::after { left: 8px; top: 4px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<canvas id="sky" aria-hidden="true"></canvas>
<canvas id="fx" aria-hidden="true"></canvas>

<div class="app">
  <header class="top">
    <div class="brand">
      <h1>流光清单</h1>
      <p class="dateline" id="dateline"></p>
    </div>
    <div class="statbox" aria-label="今日进度">
      <div class="ringwrap">
        <svg width="62" height="62" viewBox="0 0 62 62">
          <defs>
            <linearGradient id="ringgrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#46E8D2"></stop>
              <stop offset="100%" stop-color="#8B7DFF"></stop>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="31" cy="31" r="26" fill="none" stroke-width="5"></circle>
          <circle class="ring-bar" id="ringbar" cx="31" cy="31" r="26" fill="none" stroke="url(#ringgrad)" stroke-width="5"
                  stroke-linecap="round" stroke-dasharray="163.4" stroke-dashoffset="163.4"></circle>
        </svg>
        <span class="ringnum" id="ringnum">0%</span>
      </div>
      <div class="statmeta">
        <span class="slabel">今日完成</span>
        <span class="sval" id="todaycount">0 / 0</span>
      </div>
      <div class="statmeta hidesm">
        <span class="slabel">连续打卡</span>
        <span class="sval streak" id="streakval">0 天</span>
      </div>
    </div>
  </header>

  <section class="composer">
    <form id="addForm">
      <input type="text" id="newTitle" placeholder="想做点什么？回车即可添加 ✦" autocomplete="off" maxlength="200">
      <button type="button" class="btn" id="moreBtn" aria-expanded="false">选项</button>
      <button type="submit" class="btn primary">添加</button>
    </form>
    <div class="extra" id="extra" hidden>
      <div class="exrow">
        <span class="exlabel">日期</span>
        <button type="button" class="chip datechip" data-quick="0">今天</button>
        <button type="button" class="chip datechip" data-quick="1">明天</button>
        <button type="button" class="chip datechip" data-quick="7">下周</button>
        <input type="date" id="newDue">
      </div>
      <div class="exrow">
        <span class="exlabel">优先级</span>
        <button type="button" class="chip p-none on" data-pri="none">无</button>
        <button type="button" class="chip p-low" data-pri="low">低</button>
        <button type="button" class="chip p-mid" data-pri="mid">中</button>
        <button type="button" class="chip p-high" data-pri="high">高</button>
      </div>
      <div class="exrow">
        <span class="exlabel">标签</span>
        <input type="text" id="newTags" placeholder="用逗号分隔，如：工作, 健身" autocomplete="off">
      </div>
      <div class="exrow tagsuggest" id="tagSuggest"></div>
      <div class="exrow">
        <span class="exlabel">备注</span>
        <input type="text" id="newNote" placeholder="补充细节（可选）" autocomplete="off" maxlength="500">
      </div>
    </div>
  </section>

  <section class="toolbar">
    <div class="seg" id="filterSeg" role="tablist">
      <button data-f="all" class="on">全部</button>
      <button data-f="today">今天</button>
      <button data-f="week">本周</button>
      <button data-f="planned">已计划</button>
      <button data-f="done">已完成</button>
    </div>
    <div class="searchwrap">
      <input type="search" id="searchBox" placeholder="搜索任务… ( / )" autocomplete="off">
    </div>
    <select id="sortSel" aria-label="排序方式">
      <option value="smart">智能排序</option>
      <option value="due">按截止日期</option>
      <option value="created">按创建时间</option>
      <option value="manual">自定义（拖拽）</option>
    </select>
  </section>

  <div class="tagrow" id="tagRow"></div>

  <p class="weeknote" id="weekNote" hidden></p>
  <ul class="list" id="list"></ul>
  <div class="empty" id="empty" hidden>
    <span class="glyph">🌠</span>
    <p id="emptyText">夜空清朗，暂无任务。添加一件想做的事吧。</p>
  </div>

  <details class="donegroup" id="doneGroup" hidden>
    <summary id="doneSummary">已完成</summary>
    <ul class="list" id="doneList"></ul>
  </details>

  <footer class="foot">
    <span class="syncstatus" id="syncStatus"><span class="dot off"></span><span id="syncText">本地模式 · 未开启云同步</span></span>
    <div class="fbtns">
      <button class="btn" id="syncBtn">☁ 云同步</button>
      <button class="btn" id="backupBtn">备份 / 导入</button>
      <button class="btn" id="clearDoneBtn">清除已完成</button>
    </div>
  </footer>
</div>

<div class="toast" id="toast" role="status"></div>

<dialog class="backup" id="syncDlg">
  <h2>☁ 云同步</h2>
  <p class="hint">用 Google 账号登录后，任务实时同步到云端数据库。电脑、手机登录同一个账号即可自动共享同一份清单——一边修改，另一边立刻更新，无需输入任何配置。</p>
  <p class="hint" id="authState">未登录</p>
  <p class="hint" id="syncMsg"></p>
  <div class="dacts">
    <button class="btn" id="logoutBtn" hidden>退出登录</button>
    <button class="btn" id="closeSyncBtn">关闭</button>
    <button class="btn primary" id="loginBtn">用 Google 登录</button>
  </div>
</dialog>

<dialog class="backup" id="backupDlg">
  <h2>数据备份与导入</h2>
  <p class="hint">复制下方 JSON 保存到别处即可备份；粘贴之前的备份后点「导入」可恢复数据（会覆盖当前任务）。</p>
  <textarea id="backupArea" spellcheck="false"></textarea>
  <div class="dacts">
    <button class="btn" id="copyBtn">复制</button>
    <button class="btn" id="importBtn">导入</button>
    <button class="btn primary" id="closeDlgBtn">关闭</button>
  </div>
</dialog>

<script>
(function () {
  "use strict";
  var KEY = "lumen-todo-v1";
  var PRI_LABEL = { high: "高优先", mid: "中优先", low: "低优先" };
  var PRI_RANK = { high: 3, mid: 2, low: 1, none: 0 };
  var NEON = ["#46E8D2", "#8B7DFF", "#FF7A6B", "#FFC24D"];

  var state = {
    tasks: [],
    filter: "all",
    tag: null,
    q: "",
    sort: "smart"
  };
  var newPri = "none";
  var editingId = null;
  var undoBuf = null;
  var toastTimer = null;
  var bootRender = true;
  var reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  var deleted = {}; // 删除墓碑 id -> 时间戳，防止同步合并时已删任务复活

  /* ---------- storage ---------- */
  function load() {
    try {
      var raw = localStorage.getItem(KEY);
      if (raw) {
        var data = JSON.parse(raw);
        if (Array.isArray(data.tasks)) state.tasks = data.tasks;
        if (data.sort) state.sort = data.sort;
        if (data.deleted && typeof data.deleted === "object") deleted = data.deleted;
      }
    } catch (e) { /* 无痕模式等场景下降级为内存态 */ }
  }
  function save() {
    try {
      localStorage.setItem(KEY, JSON.stringify({ tasks: state.tasks, sort: state.sort, deleted: deleted }));
    } catch (e) { /* ignore */ }
  }

  /* ---------- cloud sync: Firebase Firestore（实时同步） ---------- */
  var pushTimer = null;
  var cloudReady = false; // 已登录且实时监听已建立

  function setSyncStatus(cls, text) {
    var dot = document.querySelector("#syncStatus .dot");
    dot.className = "dot " + cls;
    document.getElementById("syncText").textContent = text;
  }
  function normalizeDoc(doc) {
    var ts = (doc.tasks || []).slice().sort(function (a, b) { return a.id < b.id ? -1 : 1; });
    var dl = {};
    Object.keys(doc.deleted || {}).sort().forEach(function (k) { dl[k] = doc.deleted[k]; });
    return JSON.stringify({ t: ts, d: dl });
  }
  // 双向合并：每条任务取「最后修改时间」较新的一方；墓碑晚于任务修改时间则删除
  function mergeDoc(remote) {
    var rDel = remote.deleted || {};
    Object.keys(rDel).forEach(function (id) {
      if (!deleted[id] || deleted[id] < rDel[id]) deleted[id] = rDel[id];
    });
    var byId = {};
    state.tasks.forEach(function (x) { byId[x.id] = x; });
    (remote.tasks || []).forEach(function (r) {
      var l = byId[r.id];
      if (!l || (r.updatedAt || 0) > (l.updatedAt || 0)) byId[r.id] = r;
    });
    state.tasks = Object.keys(byId).map(function (k) { return byId[k]; }).filter(function (x) {
      return !(deleted[x.id] && deleted[x.id] >= (x.updatedAt || 0));
    });
  }
  function schedulePush() {
    if (!cloudReady) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(function () {
      if (!cloudReady || !window.LumenFire) return;
      setSyncStatus("busy", "同步中…");
      window.LumenFire.save({ tasks: state.tasks, deleted: deleted, savedAt: Date.now() })
        .then(function () { setSyncStatus("ok", "已同步 · 实时"); })
        .catch(function () { setSyncStatus("err", "同步失败，稍后自动重试"); });
    }, 1200);
  }
  // 以下三个回调由页面底部的 Firebase 模块脚本调用
  window.__lumenRemote = function (docData) {
    var doc = docData || {};
    var before = normalizeDoc(doc);
    mergeDoc(doc);
    rollover();
    render();
    var after = normalizeDoc({ tasks: state.tasks, deleted: deleted });
    if (after !== before) schedulePush();
    else setSyncStatus("ok", "已同步 · 实时");
  };
  window.__lumenAuth = function (user) {
    cloudReady = !!user;
    if (user) setSyncStatus("busy", "同步中…");
    else setSyncStatus("off", "本地模式 · 未登录");
    updateSyncDlg();
  };
  window.__lumenSyncErr = function (msg) { setSyncStatus("err", msg); };

  /* ---------- helpers ---------- */
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function dstr(d) { return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate()); }
  function todayStr() { return dstr(new Date()); }
  function addDays(n) { var d = new Date(); d.setDate(d.getDate() + n); return dstr(d); }
  function weekDates() {
    // 本周的 7 个日期字符串，周一为一周之始
    var d = new Date();
    var dow = (d.getDay() + 6) % 7;
    d.setDate(d.getDate() - dow);
    var out = [];
    for (var i = 0; i < 7; i++) { out.push(dstr(d)); d.setDate(d.getDate() + 1); }
    return out;
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function fmtDue(due) {
    var t = todayStr();
    if (due < t) {
      var days = Math.round((new Date(t) - new Date(due)) / 86400000);
      return { label: "逾期 " + days + " 天", cls: "overdue" };
    }
    if (due === t) return { label: "今天", cls: "today" };
    if (due === addDays(1)) return { label: "明天", cls: "" };
    var p = due.split("-");
    var label = (p[0] === t.split("-")[0] ? "" : p[0] + "/") + parseInt(p[1], 10) + "月" + parseInt(p[2], 10) + "日";
    return { label: label, cls: "" };
  }

  /* ---------- stats ---------- */
  function renderStats() {
    var t = todayStr();
    var dueToday = state.tasks.filter(function (x) { return x.due && x.due <= t && !x.done; }).length;
    var doneToday = state.tasks.filter(function (x) { return x.done && x.doneAt && x.doneAt.slice(0, 10) === t; }).length;
    var total = dueToday + doneToday;
    var pct = total === 0 ? (doneToday > 0 ? 100 : 0) : Math.round(doneToday / total * 100);
    var C = 163.4;
    document.getElementById("ringbar").style.strokeDashoffset = (C - C * pct / 100).toFixed(1);
    document.getElementById("ringnum").textContent = pct + "%";
    document.querySelector(".ringwrap").classList.toggle("full", pct === 100 && total > 0);
    document.getElementById("todaycount").textContent = doneToday + " / " + total;
    document.getElementById("streakval").textContent = streak() + " 天";
  }
  function streak() {
    var days = {};
    state.tasks.forEach(function (x) {
      if (x.done && x.doneAt) days[x.doneAt.slice(0, 10)] = true;
    });
    var n = 0;
    var cur = new Date();
    if (!days[dstr(cur)]) cur.setDate(cur.getDate() - 1); // 今天还没完成不断签
    while (days[dstr(cur)]) { n++; cur.setDate(cur.getDate() - 1); }
    return n;
  }

  /* ---------- filtering & sorting ---------- */
  function visibleTasks() {
    var t = todayStr();
    var q = state.q.trim().toLowerCase();
    return state.tasks.filter(function (x) {
      if (state.filter === "today" && !(x.due && x.due <= t)) return false;
      if (state.filter === "week") {
        var wk = weekDates();
        if (!(x.due && x.due >= wk[0] && x.due <= wk[6])) return false;
      }
      if (state.filter === "planned" && !x.due) return false;
      if (state.filter === "done" && !x.done) return false;
      if (state.tag && (x.tags || []).indexOf(state.tag) === -1) return false;
      if (q) {
        var hay = (x.title + " " + (x.note || "") + " " + (x.tags || []).join(" ")).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });
  }
  function sortTasks(arr) {
    var s = state.sort;
    return arr.slice().sort(function (a, b) {
      if (s === "manual") return (a.order || 0) - (b.order || 0);
      if (s === "created") return a.createdAt - b.createdAt;
      if (s === "due") {
        if (!!a.due !== !!b.due) return a.due ? -1 : 1;
        if (a.due !== b.due) return a.due < b.due ? -1 : 1;
        return a.createdAt - b.createdAt;
      }
      // smart: 优先级 > 截止日期 > 创建时间
      var pr = PRI_RANK[b.priority || "none"] - PRI_RANK[a.priority || "none"];
      if (pr !== 0) return pr;
      if (!!a.due !== !!b.due) return a.due ? -1 : 1;
      if (a.due && b.due && a.due !== b.due) return a.due < b.due ? -1 : 1;
      return a.createdAt - b.createdAt;
    });
  }

  /* ---------- rendering ---------- */
  function taskHTML(x) {
    var pri = x.priority || "none";
    var meta = "";
    if (x.due && !x.done) {
      var f = fmtDue(x.due);
      meta += '<span class="badge due ' + f.cls + '">' + esc(f.label) + "</span>";
    } else if (x.due) {
      meta += '<span class="badge due">' + esc(x.due.slice(5).replace("-", "/")) + "</span>";
    }
    if (pri !== "none") meta += '<span class="badge pri-' + pri + '">' + PRI_LABEL[pri] + "</span>";
    if (x.rollCount && !x.done) meta += '<span class="badge roll">已顺延 ' + x.rollCount + ' 天</span>';
    (x.tags || []).forEach(function (tg) {
      meta += '<span class="badge tag">#' + esc(tg) + "</span>";
    });
    var handle = (state.sort === "manual" && !x.done)
      ? '<button class="iconbtn draghandle" data-act="drag" aria-label="拖拽排序" title="拖拽排序">⠿</button>' : "";
    return (
      '<button class="check ' + (x.done ? "done" : "pri-" + pri) + '" data-act="toggle" aria-label="' + (x.done ? "标记为未完成" : "完成任务") + '"></button>' +
      '<div class="tbody">' +
        '<div class="ttitle">' + esc(x.title) + "</div>" +
        (x.note ? '<div class="tnote">' + esc(x.note) + "</div>" : "") +
        '<div class="tmeta">' + meta + "</div>" +
      "</div>" +
      '<div class="tacts">' + handle +
        '<button class="iconbtn" data-act="edit" aria-label="编辑" title="编辑">✎</button>' +
        '<button class="iconbtn del" data-act="del" aria-label="删除" title="删除">✕</button>' +
      "</div>"
    );
  }
  function editorHTML(x) {
    var pri = x.priority || "none";
    function chip(p, label) {
      return '<button type="button" class="chip p-' + p + (pri === p ? " on" : "") + '" data-epri="' + p + '">' + label + "</button>";
    }
    return (
      '<div class="editor">' +
        '<input type="text" class="e-title" value="' + esc(x.title) + '" maxlength="200">' +
        '<textarea class="e-note" rows="2" placeholder="备注">' + esc(x.note || "") + "</textarea>" +
        '<div class="exrow"><span class="exlabel">日期</span><input type="date" class="e-due" value="' + (x.due || "") + '">' +
          '<button type="button" class="chip" data-act="cleardue">清除日期</button></div>' +
        '<div class="exrow"><span class="exlabel">优先级</span>' +
          chip("none", "无") + chip("low", "低") + chip("mid", "中") + chip("high", "高") + "</div>" +
        '<div class="exrow"><span class="exlabel">标签</span>' +
          '<input type="text" class="e-tags" value="' + esc((x.tags || []).join(", ")) + '" placeholder="用逗号分隔"></div>' +
        '<div class="exrow tagsuggest">' + allTags().map(function (t) {
          var on = (x.tags || []).indexOf(t) !== -1;
          return '<button type="button" class="chip' + (on ? " on" : "") + '" data-etag="' + esc(t) + '">#' + esc(t) + "</button>";
        }).join("") + "</div>" +
        '<div class="edacts">' +
          '<button type="button" class="btn" data-act="cancel">取消</button>' +
          '<button type="button" class="btn primary" data-act="save">保存</button>' +
        "</div>" +
      "</div>"
    );
  }
  function render() {
    var listEl = document.getElementById("list");
    var doneListEl = document.getElementById("doneList");
    var doneGroup = document.getElementById("doneGroup");
    var vis = sortTasks(visibleTasks());
    var open = state.filter === "done" ? vis : vis.filter(function (x) { return !x.done; });
    var closed = state.filter === "done" ? [] : vis.filter(function (x) { return x.done; });
    if (state.filter === "done") {
      open = open.slice().sort(function (a, b) { return (b.doneAt || "") < (a.doneAt || "") ? -1 : 1; });
    }

    listEl.innerHTML = "";
    function makeLi(x) {
      var li = document.createElement("li");
      li.className = "task" + (x.done ? " isdone" : "");
      li.dataset.id = x.id;
      li.innerHTML = editingId === x.id ? ('<span class="check ' + (x.done ? "done" : "pri-" + (x.priority || "none")) + '" aria-hidden="true"></span>' + editorHTML(x)) : taskHTML(x);
      return li;
    }
    var weekNote = document.getElementById("weekNote");
    if (state.filter === "week") {
      // 周视图：把每天的待办按周一至周日汇总展示
      var wk = weekDates();
      var wknames = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
      var t2 = todayStr();
      wk.forEach(function (day, i) {
        var dayTasks = open.filter(function (x) { return x.due === day; });
        var dayDone = vis.filter(function (x) { return x.done && x.due === day; }).length;
        if (dayTasks.length === 0 && dayDone === 0) return;
        var head = document.createElement("li");
        head.className = "dayhead";
        var p = day.split("-");
        head.innerHTML =
          "<span>" + wknames[i] + "</span>" +
          '<span class="dhdate">' + parseInt(p[1], 10) + "/" + parseInt(p[2], 10) + "</span>" +
          (day === t2 ? '<span class="dhtoday">今天</span>' : "") +
          '<span class="dhcount">' + dayDone + " / " + (dayTasks.length + dayDone) + "</span>";
        listEl.appendChild(head);
        dayTasks.forEach(function (x) { listEl.appendChild(makeLi(x)); });
      });
      var wTotal = vis.length;
      var wDone = vis.filter(function (x) { return x.done; }).length;
      weekNote.textContent = "本周（" + wk[0].slice(5).replace("-", "/") + " – " + wk[6].slice(5).replace("-", "/") + "）共 " + wTotal + " 项 · 已完成 " + wDone + " 项";
      weekNote.hidden = wTotal === 0;
    } else {
      weekNote.hidden = true;
      open.forEach(function (x) { listEl.appendChild(makeLi(x)); });
    }

    doneListEl.innerHTML = "";
    closed.sort(function (a, b) { return (b.doneAt || "") > (a.doneAt || "") ? 1 : -1; });
    closed.forEach(function (x) {
      doneListEl.appendChild(makeLi(x));
    });
    doneGroup.hidden = closed.length === 0;
    document.getElementById("doneSummary").textContent = "已完成 · " + closed.length;

    var emptyEl = document.getElementById("empty");
    emptyEl.hidden = !(open.length === 0 && closed.length === 0);
    var msg = "夜空清朗，暂无任务。添加一件想做的事吧。";
    if (state.q) msg = "没有找到匹配「" + state.q + "」的任务。";
    else if (state.filter === "today") msg = "今天没有到期的任务，去看看星星吧 ✦";
    else if (state.filter === "week") msg = "本周还没有安排任务，给任务设置日期后会出现在这里。";
    else if (state.filter === "done") msg = "还没有完成的任务，加油！";
    else if (state.filter === "planned") msg = "还没有设定日期的任务。";
    else if (state.tag) msg = "标签「" + state.tag + "」下暂无任务。";
    document.getElementById("emptyText").textContent = msg;

    renderTags();
    renderTagSuggest();

  function renderTags() {
    var counts = {};
    state.tasks.forEach(function (x) {
      (x.tags || []).forEach(function (t) { counts[t] = (counts[t] || 0) + 1; });
    });
    var row = document.getElementById("tagRow");
    row.innerHTML = "";
    Object.keys(counts).sort().forEach(function (t) {
      var b = document.createElement("button");
      b.className = "chip" + (state.tag === t ? " on" : "");
      b.textContent = "#" + t + " " + counts[t];
      b.addEventListener("click", function () {

        render();
      });
      row.appendChild(b);
    });
  }

  /* ---------- auto rollover: 没做完的任务自动顺延到今天 ---------- */
  function rollover() {
    var t = todayStr();
    var n = 0;
    state.tasks.forEach(function (x) {
      if (!x.done && x.due && x.due < t) {
        var days = Math.round((new Date(t) - new Date(x.due)) / 86400000);
        x.rollCount = (x.rollCount || 0) + days;
        x.due = t;
        x.updatedAt = Date.now();
        n++;
      }
    });
    return n;
  }

  /* ---------- actions ---------- */
  function parseTags(s) {
    return s.split(/[,，、]/).map(function (t) { return t.trim(); }).filter(Boolean).slice(0, 10);
  }
  function allTags() {
    // 历史标签按使用频率排序，作为候选
    var counts = {};
    state.tasks.forEach(function (x) {
      (x.tags || []).forEach(function (t) { counts[t] = (counts[t] || 0) + 1; });
    });
    return Object.keys(counts).sort(function (a, b) { return counts[b] - counts[a]; });
  }
  function toggleTagStr(str, tag) {
    var tags = parseTags(str);
    var i = tags.indexOf(tag);
    if (i === -1) tags.push(tag); else tags.splice(i, 1);
    return tags.join(", ");
  }
  function renderTagSuggest() {

    if (tags.length === 0) return;
    var lab = document.createElement("span");
    lab.className = "exlabel";
    lab.textContent = "常用";
    box.appendChild(lab);
    var current = parseTags(document.getElementById("newTags").value);
    tags.forEach(function (t) {

      del.type = "button";

      del.textContent = "✕";
      del.setAttribute("aria-label", "删除标签 " + t);
      del.title = "删除这个标签";
      del.addEventListener("click", function (e) {

        removeTagEverywhere(t);
      });
      chip.appendChild(pick);
      chip.appendChild(del);
      box.appendChild(chip);
    });
  }
  function removeTagEverywhere(t) {
    var affected = state.tasks.filter(function (x) { return (x.tags || []).indexOf(t) !== -1; });
    if (!confirm("删除标签「" + t + "」？它将从 " + affected.length + " 条任务中移除。")) return;
    affected.forEach(function (x) {
      x.tags = x.tags.filter(function (g) { return g !== t; });
      x.updatedAt = Date.now();
    });
    if (state.tag === t) state.tag = null;
    var inp = document.getElementById("newTags");
    inp.value = parseTags(inp.value).filter(function (g) { return g !== t; }).join(", ");

    schedulePush();
    showToast("已删除标签「" + t + "」");

  function addTask() {

    if (!title) { titleEl.focus(); return; }
    var maxOrder = state.tasks.reduce(function (m, x) { return Math.max(m, x.order || 0); }, 0);
    state.tasks.push({
      id: uid(),
      title: title,
      note: document.getElementById("newNote").value.trim(),
      due: document.getElementById("newDue").value || null,
      priority: newPri,
      tags: parseTags(document.getElementById("newTags").value),
      done: false,
      doneAt: null,
      rollCount: 0,
      createdAt: Date.now(),
      updatedAt: Date.now(),

    document.getElementById("newNote").value = "";
    render();
    schedulePush();

  function findTask(id) {

    return null;

  function toggleDone(id, el) {
    var x = findTask(id);
    if (!x) return;
    var completing = !x.done;
    x.done = !x.done;
    x.doneAt = x.done ? new Date().toISOString() : null;
    x.updatedAt = Date.now();
    schedulePush();
    if (completing && el) {
      var r = el.getBoundingClientRect();
      burst(r.left + r.width / 2, r.top + r.height / 2);
    }
    var li = el && el.closest ? el.closest("li.task") : null;
    if (completing && li && !reduceMotion) {

  function maybeCelebrate() {
    var t = todayStr();
    var remaining = state.tasks.filter(function (x) { return x.due && x.due <= t && !x.done; }).length;
    var doneToday = state.tasks.filter(function (x) { return x.done && x.doneAt && x.doneAt.slice(0, 10) === t; }).length;
    if (remaining === 0 && doneToday > 0) {
      bigBurst();

  function deleteTask(id, li) {
    var idx = state.tasks.findIndex(function (x) { return x.id === id; });
    if (idx === -1) return;
    undoBuf = { task: state.tasks[idx], idx: idx };
    state.tasks.splice(idx, 1);
    deleted[id] = Date.now();
    if (editingId === id) editingId = null;
    schedulePush();
    if (li && !reduceMotion) {
      li.classList.add("leaving");
      setTimeout(render, 240);

    showToast("已删除「" + undoBuf.task.title.slice(0, 12) + (undoBuf.task.title.length > 12 ? "…" : "") + "」", "撤销", function () {
      if (undoBuf) {
        delete deleted[undoBuf.task.id];
        undoBuf.task.updatedAt = Date.now();

  /* ---------- confetti ---------- */
  var fx = document.getElementById("fx");

  function sizeFx() {
    fx.width = window.innerWidth * devicePixelRatio;
    fx.height = window.innerHeight * devicePixelRatio;
    fctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  function burst(x, y) {
    if (reduceMotion) return;
    for (var i = 0; i < 28; i++) {
      var a = Math.random() * Math.PI * 2;
      var v = 2 + Math.random() * 4.5;
      particles.push({
        x: x, y: y,
        vx: Math.cos(a) * v, vy: Math.sin(a) * v - 2,
        life: 1, decay: 0.02 + Math.random() * 0.02,
        size: 2.5 + Math.random() * 3.5,
        color: NEON[i % NEON.length],
        spin: Math.random() * Math.PI
      });
    }
    runFx();
  }
  function bigBurst() {
    if (reduceMotion) return;
    var w = window.innerWidth;
    burst(w * 0.25, window.innerHeight * 0.3);
    setTimeout(function () { burst(w * 0.75, window.innerHeight * 0.28); }, 180);
    setTimeout(function () { burst(w * 0.5, window.innerHeight * 0.2); }, 360);
  }
  function runFx() {
    if (fxRunning) return;
    fxRunning = true;
    sizeFx();
    (function frame() {
      fctx.clearRect(0, 0, fx.width, fx.height);
      particles = particles.filter(function (p) { return p.life > 0; });
      if (particles.length === 0) { fxRunning = false; return; }
      particles.forEach(function (p) {
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.13; p.vx *= 0.985;
        p.life -= p.decay; p.spin += 0.1;
        fctx.save();
        fctx.globalAlpha = Math.max(p.life, 0);
        fctx.translate(p.x, p.y);
        fctx.rotate(p.spin);
        fctx.fillStyle = p.color;
        fctx.shadowColor = p.color;
        fctx.shadowBlur = 6;
        fctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.7);
        fctx.restore();
      });
      requestAnimationFrame(frame);
    })();
  }

  function makeStreakTex(colorPrefix) {
    // 竖向光柱贴图：纵向两端渐隐、横向中间亮两侧暗
    var c = document.createElement("canvas");
    c.width = 24; c.height = 160;

  // 一天的天色关键帧：h=小时，top/mid/bot=天空渐变三段色，aur=极光强度，star=星星亮度，sun/moon=日月可见度
  var SKY_STOPS = [

    { h: 7.5,  top: [14, 30, 66], mid: [38, 60, 104], bot: [142, 102, 104],aur: 0.10, star: 0.15, sun: 0.7,  moon: 0 },
    { h: 10,   top: [13, 33, 76], mid: [30, 60, 112], bot: [55, 90, 140],  aur: 0,    star: 0.05, sun: 1,    moon: 0 },

    { h: 19.0, top: [9, 13, 36],  mid: [34, 25, 62],  bot: [116, 58, 68],  aur: 0.5,  star: 0.6,  sun: 0.12, moon: 0.3 },
    { h: 20.5, top: [4, 7, 14],   mid: [7, 13, 29],   bot: [10, 18, 38],   aur: 1.0,  star: 1.0,  sun: 0,    moon: 0.8 },
    { h: 24,   top: [4, 7, 14],   mid: [7, 13, 29],   bot: [10, 18, 38],   aur: 1.0,  star: 1.0,  sun: 0,    moon: 1 }
  ];
  function lerp(a, b, f) { return a + (b - a) * f; }
  function lerp3(a, b, f) { return [lerp(a[0], b[0], f), lerp(a[1], b[1], f), lerp(a[2], b[2], f)]; }
  function rgb(c) { return "rgb(" + Math.round(c[0]) + "," + Math.round(c[1]) + "," + Math.round(c[2]) + ")"; }
  function skyParams() {
    var d = new Date();
    var hf = isNaN(hourOverride) ? d.getHours() + d.getMinutes() / 60 : hourOverride;
    hf = ((hf % 24) + 24) % 24;
    var i = 0;
    while (i < SKY_STOPS.length - 2 && SKY_STOPS[i + 1].h <= hf) i++;
    var a = SKY_STOPS[i], b = SKY_STOPS[i + 1];
    var f = Math.min(Math.max((hf - a.h) / ((b.h - a.h) || 1), 0), 1);
    return {
      hf: hf,
      top: lerp3(a.top, b.top, f), mid: lerp3(a.mid, b.mid, f), bot: lerp3(a.bot, b.bot, f),
      aur: lerp(a.aur, b.aur, f), star: lerp(a.star, b.star, f),
      sun: lerp(a.sun, b.sun, f), moon: lerp(a.moon, b.moon, f)
    };
  }

  function initStars() {
    var w = window.innerWidth, h = window.innerHeight;
    starsFar = []; starsNear = [];
    var nf = Math.min(260, Math.floor(w * h / 5000));
    for (var i = 0; i < nf; i++) {
      starsFar.push({
        x: Math.random() * w, y: Math.random() * h,
        r: 0.3 + Math.random() * 0.7,
        base: 0.12 + Math.random() * 0.30, tw: 0.10 + Math.random() * 0.15,

        x: Math.random() * w, y: Math.random() * h,

  function drawAurora(t, mult) {
    var w = aur.width, h = aur.height;
    aurCtx.clearRect(0, 0, w, h);
    aurCtx.globalCompositeOperation = "lighter";
    RIBBONS.forEach(function (r, ri) {
      var baseY = r.baseY * h, amp = r.amp * h, thick = r.thick * h;
      var breathe = (0.75 + 0.25 * Math.sin(t * 0.00013 + ri * 2.1)) * mult;
      function ry(x) {
        return baseY + Math.sin(x * r.k + t * r.sp) * amp + Math.sin(x * r.k * 0.43 - t * r.sp * 0.7) * amp * 0.6;
      }
      // 带状主体
      aurCtx.beginPath();
      var step = 8, x;
      aurCtx.moveTo(0, ry(0));
      for (x = step; x <= w + step; x += step) aurCtx.lineTo(x, ry(x));
      for (x = w; x >= -step; x -= step) aurCtx.lineTo(x, ry(x) + thick);
      aurCtx.closePath();
      var g = aurCtx.createLinearGradient(0, baseY - amp, 0, baseY + thick + amp);
      g.addColorStop(0, r.color + "0)");
      g.addColorStop(0.4, r.color + (r.alpha * breathe).toFixed(3) + ")");
      g.addColorStop(1, r.color + "0)");
      aurCtx.fillStyle = g;
      aurCtx.fill();
      // 幕帘光柱：横向缓慢漂移、各自呼吸明暗
      var tex = streakTex[r.tex];
      for (var i = 0; i < r.streaks; i++) {
        var fx = ((i * 0.61803 + ri * 0.37) + t * r.sp * 0.05) % 1;
        if (fx < 0) fx += 1;
        var sx = fx * w;
        var sy = ry(sx) - thick * 0.15;
        var a = breathe * (0.5 + 0.5 * Math.sin(t * 0.0008 + i * 1.7 + ri * 3.3));

        aurCtx.globalAlpha = Math.min(a * r.alpha * 2.6, 0.5);
        var sw = w * 0.02 + (i % 3) * w * 0.008;
        aurCtx.drawImage(tex, sx - sw / 2, sy, sw, thick * 1.5);

  function drawCelestials(p) {

      var sp = Math.min(Math.max((p.hf - 6) / 13, 0), 1);
      var alt = Math.sin(sp * Math.PI); // 0=地平线 1=正午，低空时更橙红
      var sx = w * (0.10 + 0.80 * sp) + mouse.px * 0.4;
      var sy = h * (0.50 - 0.38 * alt) + mouse.py * 0.4;
      var cg = Math.round(150 + 94 * alt), cb = Math.round(70 * (1 - alt) + 90 + 60 * alt);
      var g = sctx.createRadialGradient(sx, sy, 0, sx, sy, Math.max(w, h) * 0.30);
      g.addColorStop(0, "rgba(255," + cg + ",110," + (0.22 * (1 + 0.7 * (1 - alt)) * p.sun).toFixed(3) + ")");
      g.addColorStop(0.25, "rgba(255,170,95," + (0.11 * p.sun).toFixed(3) + ")");
      g.addColorStop(1, "rgba(255,160,90,0)");

      var g2 = sctx.createRadialGradient(sx, sy, 0, sx, sy, 30);
      g2.addColorStop(0, "rgba(255," + Math.round(180 + 64 * alt) + "," + cb + "," + (0.9 * p.sun).toFixed(3) + ")");
      g2.addColorStop(0.5, "rgba(255," + cg + ",100," + (0.35 * p.sun).toFixed(3) + ")");
      g2.addColorStop(1, "rgba(255,170,90,0)");

      sctx.beginPath();
      sctx.arc(sx, sy, 30, 0, Math.PI * 2);

    // 月亮：20:00–5:00 沿弧线移动，带光晕、月牙阴影与环形山
    if (p.moon > 0.02) {
      var mp = ((p.hf - 20 + 24) % 24) / 9;
      if (mp >= 0 && mp <= 1) {

        sctx.globalAlpha = 0.10 * p.moon;
        sctx.fillStyle = "#9FB4D8";
        [[-0.3, -0.2, 0.28], [0.25, 0.15, 0.20], [-0.05, 0.35, 0.14]].forEach(function (cr) {
          sctx.beginPath();
          sctx.arc(mx + cr[0] * R, my + cr[1] * R, cr[2] * R, 0, Math.PI * 2);
          sctx.fill();
        });
        sctx.globalAlpha = 0.30 * p.moon;
        sctx.fillStyle = rgb(skyParams().top);
        sctx.beginPath();
        sctx.arc(mx + R * 0.42, my - R * 0.18, R * 0.92, 0, Math.PI * 2);
        sctx.fill();
        sctx.globalAlpha = 1;
      }
    }
  }
  function drawStars(list, t, p, sc, depthS, depthM, glint) {
    var h = window.innerHeight;
    list.forEach(function (s) {
      var a = (s.base + Math.sin(t * 0.001 * s.sp + s.ph) * s.tw) * p.star;
      if (a <= 0.02) return;
      var x = s.x + mouse.px * depthM;
      var y = ((s.y - sc * depthS) % h + h) % h + mouse.py * depthM;
      // 近层星星被光标推开（斥力场）
      if (glint && hoverFine) {
        var dx = x - mouse.cx, dy = y - mouse.cy;
        var d2 = dx * dx + dy * dy;
        if (d2 < 16900 && d2 > 0.01) {
          var d = Math.sqrt(d2);
          var f = (1 - d / 130) * 16;
          x += dx / d * f;
          y += dy / d * f;
        }
      }
      sctx.globalAlpha = Math.min(Math.max(a, 0), 1);
      sctx.fillStyle = s.cold ? "#CFE3FF" : "#FFF2DC";
      // 快速滚动时星星拉出拖影
      var len = scrollVel * (glint ? 1.4 : 0.7);
      if (Math.abs(len) > 3) {
        len = Math.max(-22, Math.min(22, len));
        sctx.strokeStyle = sctx.fillStyle;
        sctx.lineWidth = s.r * 1.6;
        sctx.lineCap = "round";
        sctx.beginPath();
        sctx.moveTo(x, y);
        sctx.lineTo(x, y + len);
        sctx.stroke();
      } else {
        sctx.beginPath();
        sctx.arc(x, y, s.r, 0, Math.PI * 2);
        sctx.fill();
      }
      // 亮星在闪烁峰值时展开十字星芒
      if (glint && a > 0.62) {
        var L = s.r * 5;
        sctx.globalAlpha = Math.min((a - 0.62) * 2, 0.7);
        sctx.strokeStyle = "#EAF6FF";
        sctx.lineWidth = 0.7;
        sctx.beginPath();
        sctx.moveTo(x - L, y); sctx.lineTo(x + L, y);
        sctx.moveTo(x, y - L); sctx.lineTo(x, y + L);
        sctx.stroke();
      }
    });
    sctx.globalAlpha = 1;
  }
  function drawSparkles() {
    for (var i = sparkles.length - 1; i >= 0; i--) {
      var s = sparkles[i];
      s.x += s.vx; s.y += s.vy;
      s.vy += 0.015;
      s.life -= 0.028;
      if (s.life <= 0) { sparkles.splice(i, 1); continue; }
      sctx.globalAlpha = Math.min(s.life, 1) * 0.85;
      sctx.fillStyle = s.color;
      sctx.beginPath();
      sctx.arc(s.x, s.y, s.r * s.life, 0, Math.PI * 2);
      sctx.fill();
    }
    sctx.globalAlpha = 1;
  }
  function drawSky(t) {
    var w = window.innerWidth, h = window.innerHeight;
    var p = skyParams();
    // 视差缓动趋近目标
    mouse.px += (mouse.tx - mouse.px) * 0.05;
    mouse.py += (mouse.ty - mouse.py) * 0.05;
    var sc = window.scrollY || 0;
    scrollVel += ((sc - lastScrollY) - scrollVel) * 0.3;
    lastScrollY = sc;
    // 天色背景
    var bg = sctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, rgb(p.top));
    bg.addColorStop(0.55, rgb(p.mid));
    bg.addColorStop(1, rgb(p.bot));
    sctx.fillStyle = bg;
    sctx.fillRect(0, 0, w, h);
    // 极光（随滚动上移、随鼠标轻微漂移）
    if (p.aur > 0.02) {
      drawAurora(t, p.aur);
      var ox = -w * 0.03 + mouse.px * 0.5;
      var oy = -h * 0.03 - Math.min(sc * 0.06, h * 0.05) + mouse.py * 0.4;
      sctx.drawImage(aur, ox, oy, w * 1.06, h * 1.06);
    }
    drawCelestials(p);
    // 星层（远近视差：滚动 + 鼠标）
    drawStars(starsFar, t, p, sc, 0.05, 6, false);
    drawStars(starsNear, t, p, sc, 0.12, 14, true);
    drawSparkles();
    // 流星（只在星光可见的时段出现）
    if (p.star > 0.4) {
      if (!shot && t > nextShotAt) {
        shot = {
          x: w * (0.15 + Math.random() * 0.7),
          y: h * (0.04 + Math.random() * 0.22),
          vx: 6 + Math.random() * 5,
          vy: 2.5 + Math.random() * 2,
          tail: 15,
          life: 1
        };
        if (Math.random() < 0.5) shot.vx = -shot.vx;
      }
    }
    if (shot) {
      var hg = sctx.createRadialGradient(shot.x, shot.y, 0, shot.x, shot.y, 7);
      hg.addColorStop(0, "rgba(255,255,255," + (0.9 * shot.life * p.star).toFixed(3) + ")");
      hg.addColorStop(1, "rgba(160,220,255,0)");
      sctx.fillStyle = hg;
      sctx.beginPath();
      sctx.arc(shot.x, shot.y, 7, 0, Math.PI * 2);
      sctx.fill();
      sctx.lineCap = "round";
      var segs = 12;
      for (var i = 0; i < segs; i++) {
        var f0 = i / segs, f1 = (i + 1) / segs;
        sctx.strokeStyle = "rgba(200,235,255," + (0.7 * shot.life * p.star * (1 - f0)).toFixed(3) + ")";
        sctx.lineWidth = 2.2 * (1 - f0) + 0.2;
        sctx.beginPath();
        sctx.moveTo(shot.x - shot.vx * shot.tail * f0, shot.y - shot.vy * shot.tail * f0);
        sctx.lineTo(shot.x - shot.vx * shot.tail * f1, shot.y - shot.vy * shot.tail * f1);
        sctx.stroke();
      }
      shot.x += shot.vx;
      shot.y += shot.vy;
      shot.life -= 0.02;
      if (shot.life <= 0 || shot.x < -250 || shot.x > w + 250 || shot.y > h + 120) {
        shot = null;
        nextShotAt = t + 5000 + Math.random() * 8000;
      }
    }
  }
  function skyLoop(ts) {
    drawSky(ts);
    if (!reduceMotion) requestAnimationFrame(skyLoop);
  }
  // 鼠标交互：视差目标 + 星尘轨迹（仅限有精确指针的设备）
  if (hoverFine && !reduceMotion) {
    var SPARK_COLORS = ["#7FF3E1", "#EAF6FF", "#B9AEFF", "#FFE6B3"];
    var lastSpark = 0, lsx = -99, lsy = -99;
    window.addEventListener("pointermove", function (e) {
      mouse.tx = (e.clientX / window.innerWidth - 0.5) * 14;
      mouse.ty = (e.clientY / window.innerHeight - 0.5) * 10;
      mouse.cx = e.clientX;
      mouse.cy = e.clientY;
      var now = performance.now();
      var dx = e.clientX - lsx, dy = e.clientY - lsy;
      if (now - lastSpark > 26 && dx * dx + dy * dy > 130 && sparkles.length < 90) {
        lastSpark = now; lsx = e.clientX; lsy = e.clientY;
        sparkles.push({
          x: e.clientX + (Math.random() - 0.5) * 8,
          y: e.clientY + (Math.random() - 0.5) * 8,
          vx: (Math.random() - 0.5) * 0.9,
          vy: (Math.random() - 0.5) * 0.9 - 0.2,
          r: 0.8 + Math.random() * 1.5,
          life: 0.7 + Math.random() * 0.5,
          color: SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)]
        });
      }
    });
  }

  /* ---------- drag reorder (pointer events) ---------- */
  var drag = null;
  document.getElementById("list").addEventListener("pointerdown", function (e) {
    var handle = e.target.closest('[data-act="drag"]');
    if (!handle || state.sort !== "manual") return;
    var li = handle.closest("li.task");
    if (!li) return;
    e.preventDefault();
    drag = { li: li, startY: e.clientY };
    li.classList.add("dragging");
    handle.setPointerCapture && handle.setPointerCapture(e.pointerId);
    function onMove(ev) {
      if (!drag) return;
      var list = document.getElementById("list");
      var items = Array.prototype.slice.call(list.children).filter(function (n) { return n !== drag.li && n.classList.contains("task"); });
      var y = ev.clientY;
      var placed = false;
      for (var i = 0; i < items.length; i++) {
        var r = items[i].getBoundingClientRect();
        if (y < r.top + r.height / 2) {
          list.insertBefore(drag.li, items[i]);
          placed = true;
          break;
        }
      }
      if (!placed) list.appendChild(drag.li);
    }
    function onUp() {
      if (!drag) return;
      drag.li.classList.remove("dragging");
      var ids = [];
      Array.prototype.forEach.call(document.getElementById("list").children, function (n) {
        if (n.dataset && n.dataset.id) ids.push(n.dataset.id);
      });
      ids.forEach(function (id, i) {
        var x = findTask(id);
        if (x && x.order !== i + 1) { x.order = i + 1; x.updatedAt = Date.now(); }
      });
      schedulePush();
      drag = null;
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      document.removeEventListener("pointercancel", onUp);
      render();
    }
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
    document.addEventListener("pointercancel", onUp);
  });

  /* ---------- event wiring ---------- */
  document.getElementById("addForm").addEventListener("submit", function (e) {
    e.preventDefault();
    addTask();
  });
  document.getElementById("moreBtn").addEventListener("click", function () {
    var ex = document.getElementById("extra");
    ex.hidden = !ex.hidden;
    this.setAttribute("aria-expanded", String(!ex.hidden));
  });
  document.querySelectorAll("#extra [data-quick]").forEach(function (b) {
    b.addEventListener("click", function () {
      document.getElementById("newDue").value = addDays(parseInt(this.dataset.quick, 10));
      document.querySelectorAll("#extra [data-quick]").forEach(function (x) { x.classList.remove("on"); });
      this.classList.add("on");
    });
  });
  document.getElementById("newDue").addEventListener("input", function () {
    document.querySelectorAll("#extra [data-quick]").forEach(function (x) { x.classList.remove("on"); });
  });
  document.getElementById("newTags").addEventListener("input", renderTagSuggest);
  document.querySelectorAll("#extra [data-pri]").forEach(function (b) {
    b.addEventListener("click", function () {
      newPri = this.dataset.pri;
      document.querySelectorAll("#extra [data-pri]").forEach(function (x) { x.classList.remove("on"); });
      this.classList.add("on");
    });
  });
  document.getElementById("filterSeg").addEventListener("click", function (e) {
    var b = e.target.closest("button[data-f]");
    if (!b) return;
    state.filter = b.dataset.f;
    this.querySelectorAll("button").forEach(function (x) { x.classList.remove("on"); });
    b.classList.add("on");
    render();
  });
  document.getElementById("searchBox").addEventListener("input", function () {
    state.q = this.value;
    render();
  });
  document.getElementById("sortSel").addEventListener("change", function () {
    state.sort = this.value;
    render();
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "/" && !/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)) {
      e.preventDefault();
      document.getElementById("searchBox").focus();
    }
  });

  function listClickHandler(e) {
    var li = e.target.closest("li.task");
    if (!li) return;
    var actEl = e.target.closest("[data-act]");
    var act = actEl ? actEl.dataset.act : null;
    var epriEl = e.target.closest("[data-epri]");
    var etagEl = e.target.closest("[data-etag]");
    var id = li.dataset.id;
    if (act === "toggle") toggleDone(id, actEl);
    else if (act === "del") deleteTask(id, li);
    else if (act === "edit") { editingId = id; render(); var f = document.querySelector('li[data-id="' + id + '"] .e-title'); if (f) f.focus(); }
    else if (act === "cancel") { editingId = null; render(); }
    else if (act === "save") saveEdit(li);
    else if (act === "cleardue") { var d = li.querySelector(".e-due"); if (d) d.value = ""; }
    else if (epriEl) {
      li.querySelectorAll("[data-epri]").forEach(function (x) { x.classList.remove("on"); });
      epriEl.classList.add("on");
    }
    else if (etagEl) {
      var inp = li.querySelector(".e-tags");
      if (inp) inp.value = toggleTagStr(inp.value, etagEl.dataset.etag);
      etagEl.classList.toggle("on");
    }
  }
  document.getElementById("list").addEventListener("click", listClickHandler);
  document.getElementById("doneList").addEventListener("click", listClickHandler);

  // 桌面端：任务卡片 3D 倾斜跟随光标
  if (window.matchMedia("(hover: hover) and (pointer: fine)").matches && !reduceMotion) {
    ["list", "doneList"].forEach(function (id) {
      var box = document.getElementById(id);
      box.addEventListener("mousemove", function (e) {
        var li = e.target.closest("li.task");
        if (!li || li.classList.contains("dragging") || li.classList.contains("completing") || li.classList.contains("leaving")) return;
        var r = li.getBoundingClientRect();
        var rx = ((e.clientY - r.top) / r.height - 0.5) * -2.4;
        var ry = ((e.clientX - r.left) / r.width - 0.5) * 2.4;
        li.style.transform = "perspective(700px) rotateX(" + rx.toFixed(2) + "deg) rotateY(" + ry.toFixed(2) + "deg) translateY(-2px)";
      });
      box.addEventListener("mouseout", function (e) {
        var li = e.target.closest("li.task");
        if (li && !li.contains(e.relatedTarget)) li.style.transform = "";
      });
    });
  }

  document.getElementById("clearDoneBtn").addEventListener("click", function () {
    var n = state.tasks.filter(function (x) { return x.done; }).length;
    if (n === 0) { showToast("没有已完成的任务"); return; }
    if (!confirm("确定清除 " + n + " 条已完成任务吗？此操作不可撤销。")) return;
    state.tasks.forEach(function (x) { if (x.done) deleted[x.id] = Date.now(); });
    state.tasks = state.tasks.filter(function (x) { return !x.done; });
    render();
    schedulePush();
    showToast("已清除 " + n + " 条已完成任务");
  });

  /* backup dialog */
  var dlg = document.getElementById("backupDlg");
  document.getElementById("backupBtn").addEventListener("click", function () {
    document.getElementById("backupArea").value = JSON.stringify({ tasks: state.tasks, exportedAt: new Date().toISOString() }, null, 2);
    dlg.showModal();
  });
  document.getElementById("closeDlgBtn").addEventListener("click", function () { dlg.close(); });
  document.getElementById("copyBtn").addEventListener("click", function () {
    var ta = document.getElementById("backupArea");
    ta.select();
    var ok = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(ta.value);
        ok = true;
      } else {
        ok = document.execCommand("copy");
      }
    } catch (e) { /* fall through */ }
    this.textContent = ok ? "已复制 ✓" : "请手动复制";
    var self = this;
    setTimeout(function () { self.textContent = "复制"; }, 2000);
  });
  document.getElementById("importBtn").addEventListener("click", function () {
    var raw = document.getElementById("backupArea").value.trim();
    try {
      var data = JSON.parse(raw);
      var tasks = Array.isArray(data) ? data : data.tasks;
      if (!Array.isArray(tasks)) throw new Error("bad");
      var cleaned = tasks.filter(function (x) { return x && typeof x.title === "string"; }).map(function (x, i) {
        return {
          id: x.id || uid(),
          title: x.title,
          note: x.note || "",
          due: x.due || null,
          priority: PRI_RANK.hasOwnProperty(x.priority) ? x.priority : "none",
          tags: Array.isArray(x.tags) ? x.tags : [],
          done: !!x.done,
          doneAt: x.doneAt || null,
          rollCount: x.rollCount || 0,
          createdAt: x.createdAt || Date.now() + i,
          updatedAt: Date.now(),
          order: x.order || i + 1
        };
      });
      if (!confirm("将导入 " + cleaned.length + " 条任务并覆盖当前数据，确定吗？")) return;
      var keep = {};
      cleaned.forEach(function (x) { keep[x.id] = true; });
      state.tasks.forEach(function (x) { if (!keep[x.id]) deleted[x.id] = Date.now(); });
      cleaned.forEach(function (x) { delete deleted[x.id]; });
      state.tasks = cleaned;
      editingId = null;
      dlg.close();
      render();
      schedulePush();
      showToast("已导入 " + cleaned.length + " 条任务");
    } catch (e) {
      showToast("导入失败：JSON 格式不正确");
    }
  });

  /* sync dialog */
  var syncDlg = document.getElementById("syncDlg");
  function syncMsg(text, cls) {
    var m = document.getElementById("syncMsg");
    m.textContent = text || "";
    m.className = "hint " + (cls || "");
  }
  function updateSyncDlg() {
    var user = window.LumenFire && window.LumenFire.user;
    var configured = !!window.LumenFire;
    document.getElementById("authState").textContent = user
      ? "已登录：" + (user.email || user.displayName || "Google 账号")
      : (configured ? "未登录" : "同步服务尚未配置完成，暂时只能本地使用");
    document.getElementById("loginBtn").hidden = !!user;
    document.getElementById("logoutBtn").hidden = !user;
  }
  document.getElementById("syncBtn").addEventListener("click", function () {
    syncMsg("");
    updateSyncDlg();
    syncDlg.showModal();
  });
  document.getElementById("closeSyncBtn").addEventListener("click", function () { syncDlg.close(); });
  document.getElementById("loginBtn").addEventListener("click", function () {
    if (!window.LumenFire) { syncMsg("同步服务尚未配置完成", "err"); return; }
    syncMsg("正在打开 Google 登录…");
    window.LumenFire.login();
  });
  document.getElementById("logoutBtn").addEventListener("click", function () {
    if (window.LumenFire) window.LumenFire.logout();
    syncMsg("已退出，数据仅保留在本设备", "ok");
  });

  /* ---------- init ---------- */
  function renderDateline() {
    var d = new Date();
    var weeks = ["日", "一", "二", "三", "四", "五", "六"];
    var h = d.getHours();
    var greet = h < 5 ? "夜深了" : h < 11 ? "早上好" : h < 13 ? "中午好" : h < 18 ? "下午好" : "晚上好";
    document.getElementById("dateline").textContent =
      (d.getMonth() + 1) + "月" + d.getDate() + "日 星期" + weeks[d.getDay()] + " · " + greet;
  }

  load();
  document.getElementById("sortSel").value = state.sort;
  var rolled = rollover();
  renderDateline();
  render();
  if (rolled > 0) showToast("有 " + rolled + " 条未完成任务已自动顺延到今天");
  try {
    // 从旧版同步方式升级过来的用户提示一次
    if (localStorage.getItem("lumen-sync-v1") || localStorage.getItem("lumen-sync-v2")) {
      localStorage.removeItem("lumen-sync-v1");
      localStorage.removeItem("lumen-sync-v2");
      showToast("云同步已升级：点底部「☁ 云同步」用 Google 登录即可，数据不会丢失");
    }
  } catch (e) { /* ignore */ }
  sizeSky();
  if (reduceMotion) drawSky(1000);
  else requestAnimationFrame(skyLoop);
  window.addEventListener("resize", function () { sizeSky(); if (reduceMotion) drawSky(1000); });

  // 跨天时（页面一直开着或从后台切回）自动顺延并刷新
  var curDay = todayStr();
  function checkDayChange() {
    if (todayStr() !== curDay) {
      curDay = todayStr();
      var n = rollover();
      renderDateline();
      render();
      if (n > 0) showToast("新的一天！" + n + " 条未完成任务已顺延到今天");
    } else {
      renderDateline();
      renderStats();
    }
  }
  setInterval(checkDayChange, 60000);
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) checkDayChange();
    // 云端同步是实时监听，切回页面时 SDK 会自动重连，无需手动拉取
  });
})();
</script>
<script type="module">
// ===== Firebase 云同步（Firestore 实时数据库 + Google 登录）=====

const FIREBASE_CONFIG = {

if (FIREBASE_CONFIG) {
  try {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } =
      await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
    const { initializeFirestore, persistentLocalCache, doc, setDoc, onSnapshot } =
      await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    let db;
    try {
      db = initializeFirestore(app, { localCache: persistentLocalCache() });
    } catch (e) {
      const { getFirestore } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
      db = getFirestore(app);
    }

    let unsub = null;
    let ref = null;

    window.LumenFire = {
      user: null,
      login() {
        const provider = new GoogleAuthProvider();
        signInWithPopup(auth, provider).catch(function () {
          // 移动端浏览器弹窗可能被拦截，回退到整页跳转登录
          signInWithRedirect(auth, provider);
        });
      },
      logout() { signOut(auth); },
      save(docData) {
        return ref ? setDoc(ref, docData) : Promise.reject(new Error("not signed in"));
      }
    };

    getRedirectResult(auth).catch(function () { /* 非跳转返回场景，忽略 */ });
    onAuthStateChanged(auth, function (user) {
      window.LumenFire.user = user;
      if (unsub) { unsub(); unsub = null; ref = null; }
      if (user) {
        ref = doc(db, "users", user.uid, "lumen", "data");
        unsub = onSnapshot(ref, function (snap) {
          if (snap.metadata.hasPendingWrites) return; // 本地写入的回显，跳过
          window.__lumenRemote(snap.exists() ? snap.data() : { tasks: [], deleted: {} });
        }, function (err) {
          window.__lumenSyncErr("同步失败：" + (err.code || "网络错误"));
        });
      }
      window.__lumenAuth(user);
    });
  } catch (e) {
    window.__lumenSyncErr("同步服务加载失败");
  }
}
</script>
</body>
</html>
